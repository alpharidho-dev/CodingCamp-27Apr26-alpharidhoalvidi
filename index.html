<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aplikasi web untuk mengelola dan memvisualisasikan pengeluaran pribadi">
  <title>Expense & Budget Visualizer</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  
  <!-- Header -->
  <header class="bg-blue-600 text-white py-6 px-4 shadow-lg">
    <div class="container mx-auto">
      <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold text-center">Expense & Budget Visualizer</h1>
      <p class="text-center text-blue-100 text-sm sm:text-base mt-2">Kelola pengeluaran Anda dengan mudah</p>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto px-4 py-6 sm:py-8 flex-grow">
    
    <!-- Balance Display -->
    <section class="bg-white rounded-lg shadow-md p-4 sm:p-6 mb-6 sm:mb-8">
      <h2 class="text-lg sm:text-xl font-semibold text-gray-700 mb-2">Total Pengeluaran</h2>
      <div id="balance-display" class="text-3xl sm:text-4xl md:text-5xl font-bold text-blue-600">Rp 0</div>
    </section>

    <!-- Transaction Input Form -->
    <section class="bg-white rounded-lg shadow-md p-4 sm:p-6 mb-6 sm:mb-8">
      <h2 class="text-lg sm:text-xl font-semibold text-gray-700 mb-4">Tambah Transaksi</h2>
      
      <form id="transaction-form" class="space-y-4">
        <!-- Transaction Name -->
        <div>
          <label for="transaction-name" class="block text-sm font-medium text-gray-700 mb-1">
            Nama Transaksi
          </label>
          <input 
            type="text" 
            id="transaction-name" 
            name="name"
            placeholder="Contoh: Makan Siang"
            class="w-full px-3 sm:px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition duration-150"
            required
          >
          <p id="name-error" class="text-red-500 text-sm mt-1 hidden"></p>
        </div>

        <!-- Transaction Amount -->
        <div>
          <label for="transaction-amount" class="block text-sm font-medium text-gray-700 mb-1">
            Jumlah (Rp)
          </label>
          <input 
            type="number" 
            id="transaction-amount" 
            name="amount"
            placeholder="Contoh: 50000"
            min="0"
            step="1000"
            class="w-full px-3 sm:px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition duration-150"
            required
          >
          <p id="amount-error" class="text-red-500 text-sm mt-1 hidden"></p>
        </div>

        <!-- Category Dropdown -->
        <div>
          <label for="transaction-category" class="block text-sm font-medium text-gray-700 mb-1">
            Kategori
          </label>
          <div class="flex gap-2">
            <select 
              id="transaction-category" 
              name="category"
              class="flex-1 px-3 sm:px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition duration-150 bg-white"
              required
            >
              <option value="">-- Pilih Kategori --</option>
              <option value="Makanan">Makanan</option>
              <option value="Transport">Transport</option>
              <option value="Hiburan">Hiburan</option>
            </select>
            <button 
              type="button"
              id="add-category-btn"
              class="px-3 sm:px-4 py-2 bg-green-600 text-white rounded-lg font-medium hover:bg-green-700 active:bg-green-800 transition duration-150 focus:ring-4 focus:ring-green-300 focus:outline-none whitespace-nowrap"
              title="Tambah Kategori Baru"
            >
              + Kategori
            </button>
          </div>
          <p id="category-error" class="text-red-500 text-sm mt-1 hidden"></p>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit"
          class="w-full bg-blue-600 text-white py-2.5 sm:py-3 px-4 rounded-lg font-semibold hover:bg-blue-700 active:bg-blue-800 transition duration-150 focus:ring-4 focus:ring-blue-300 focus:outline-none"
        >
          Tambah Transaksi
        </button>
      </form>
    </section>

    <!-- Transaction List and Chart Container -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8">
      
      <!-- Transaction List -->
      <section class="bg-white rounded-lg shadow-md p-4 sm:p-6">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-4 gap-3">
          <h2 class="text-lg sm:text-xl font-semibold text-gray-700">Daftar Transaksi</h2>
          
          <!-- Month Filter Dropdown -->
          <div class="flex items-center gap-2">
            <label for="month-filter" class="text-sm font-medium text-gray-700 whitespace-nowrap">
              Filter Bulan:
            </label>
            <select 
              id="month-filter"
              class="px-3 py-1.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition duration-150 bg-white text-sm"
            >
              <option value="all">Semua Bulan</option>
            </select>
          </div>
        </div>
        
        <!-- Sort Controls -->
        <div class="flex flex-wrap items-center gap-2 mb-4 pb-3 border-b border-gray-200">
          <span class="text-sm font-medium text-gray-700">Urutkan:</span>
          <button 
            id="sort-by-amount-btn"
            class="sort-btn px-3 py-1.5 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 active:bg-gray-100 transition duration-150 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            data-sort-by="amount"
          >
            Jumlah <span class="sort-indicator"></span>
          </button>
          <button 
            id="sort-by-category-btn"
            class="sort-btn px-3 py-1.5 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 active:bg-gray-100 transition duration-150 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            data-sort-by="category"
          >
            Kategori <span class="sort-indicator"></span>
          </button>
        </div>
        
        <div id="transaction-list" class="space-y-3">
          <p class="text-gray-500 text-center py-8">Belum ada transaksi</p>
        </div>
      </section>

      <!-- Pie Chart -->
      <section class="bg-white rounded-lg shadow-md p-4 sm:p-6">
        <h2 class="text-lg sm:text-xl font-semibold text-gray-700 mb-4">Visualisasi Pengeluaran</h2>
        <div id="chart-container" class="flex items-center justify-center min-h-[250px] sm:min-h-[300px]">
          <canvas id="expense-chart" class="max-w-full max-h-[400px]"></canvas>
        </div>
      </section>

    </div>

  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-4 sm:py-6 px-4 mt-8">
    <div class="container mx-auto text-center">
      <p class="text-sm sm:text-base">&copy; <span id="year"></span> Expense & Budget Visualizer</p>
      <p class="text-gray-400 text-xs sm:text-sm mt-1">Dibuat dengan HTML5, Tailwind CSS, dan Chart.js</p>
    </div>
  </footer>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Custom JavaScript -->
  <script src="js/script.js"></script>

</body>
</html>
